apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-pv-pod
  labels:
    app.kubernetes.io/name: task-pv-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: task-pv-pod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: task-pv-pod
    spec:
      volumes:
        - name: task-pv-storage
          persistentVolumeClaim:
            claimName: task-pv-claim
      containers:
        - name: task-pv-container
          image: nginx
          ports:
            - containerPort: 80
              name: "http-server"
          volumeMounts:
            - mountPath: "/usr/share/nginx/html"
              name: task-pv-storage
